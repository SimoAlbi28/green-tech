# =============================================================================
# CONFIGURAZIONE BACKEND - application.properties
# =============================================================================
# CAMBIA i valori qui sotto per adattare il backend al tuo progetto

# ========== PORTA DEL SERVER ==========
# Il frontend (Vite) fa proxy a questa porta
server.port=8080

# ========== CONFIGURAZIONE DATABASE MYSQL ==========
# CAMBIA: nome del database, username e password
spring.datasource.url=jdbc:mysql://localhost:3306/greentech_db
spring.datasource.username=root
# CAMBIA ^^^^ con il tuo username MySQL
spring.datasource.password=root

# ========== JPA / HIBERNATE ==========
# update = crea/aggiorna le tabelle automaticamente in base alle Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========== SWAGGER UI ==========
# Accessibile a: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# ========== CORS ==========
# Permette al frontend (porta 5173) di chiamare il backend (porta 8080)
# Utile solo se NON usi il proxy di Vite
